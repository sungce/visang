<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?•ліҙ көҗкіј ???ҷмҠө ?Ңлһ«??/title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #F7F6F2;
            --surface: #FFFFFF;
            --border: #E8E5DC;
            --text: #1A1A1A;
            --text-muted: #6B6860;
            --text-light: #9B9890;

            --unit-1: #7B74D9;
            --unit-1-light: #EEEDFE;
            --unit-2: #1B9E72;
            --unit-2-light: #E1F5EE;
            --unit-3: #D85A30;
            --unit-3-light: #FAECE7;
            --unit-4: #3080D9;
            --unit-4-light: #E6F1FB;
            --unit-5: #5A9622;
            --unit-5-light: #EAF3DE;

            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0, 0, 0, .06), 0 4px 12px rgba(0, 0, 0, .04);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, .10);

            --sidebar-w: 240px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
        }

        /* ?Җ?Җ?Җ SIDEBAR ?Җ?Җ?Җ */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: transform .3s ease;
        }

        .sidebar-logo {
            padding: 22px 20px 18px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo .logo-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .sidebar-logo h1 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
        }

        .sidebar-logo .sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sidebar-nav {
            padding: 12px 0;
            flex: 1;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text-light);
            padding: 8px 20px 4px;
            margin-top: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 20px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
            border-radius: 0;
            transition: all .15s;
            border-left: 2px solid transparent;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--text);
        }

        .nav-item.active {
            color: var(--text);
            font-weight: 600;
            background: var(--bg);
        }

        .nav-item .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .nav-item .nav-badge {
            margin-left: auto;
            font-size: 10px;
            background: var(--bg);
            color: var(--text-muted);
            padding: 1px 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--unit-3), var(--unit-1));
            border-radius: 4px;
            transition: width .8s ease;
        }

        /* ?Җ?Җ?Җ MAIN ?Җ?Җ?Җ */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ?Җ?Җ?Җ TOP BAR ?Җ?Җ?Җ */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .topbar-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            flex: 1;
        }

        .topbar-breadcrumb .sep {
            color: var(--border);
        }

        .topbar-breadcrumb .current {
            color: var(--text);
            font-weight: 500;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-weight: 500;
            transition: all .15s;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--bg);
            border-color: #ccc;
        }

        .btn-primary {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        .btn-primary:hover {
            opacity: .85;
        }

        /* ?Җ?Җ?Җ VIEWS ?Җ?Җ?Җ */
        .view {
            display: none;
            padding: 28px;
            animation: fadeIn .25s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ?Җ?Җ?Җ DASHBOARD ?Җ?Җ?Җ */
        .dash-hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .dash-hero-text h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .dash-hero-text p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .dash-stats {
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .stat-card {
            text-align: center;
            padding: 14px 18px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            min-width: 80px;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .section-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .units-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        @media (max-width: 1200px) {
            .units-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .units-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .unit-overview-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .unit-overview-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
            border-color: var(--border);
        }

        .unit-overview-card p {
            flex: 1;
        }

        .unit-overview-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .unit-overview-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }

        .unit-roman {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .unit-overview-card h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .unit-overview-card .unit-meta-small {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .unit-tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .chip {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 500;
        }

        .unit-progress-mini {
            margin-top: 12px;
            height: 3px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .unit-progress-mini-fill {
            height: 100%;
            border-radius: 4px;
        }

        .lessons-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .lessons-list-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lesson-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background .15s;
        }

        .lesson-row:last-child {
            border-bottom: none;
        }

        .lesson-row:hover {
            background: var(--bg);
        }

        .lesson-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .lesson-info {
            flex: 1;
        }

        .lesson-info h5 {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .lesson-info p {
            font-size: 11px;
            color: var(--text-muted);
        }

        .lesson-status {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .status-done {
            background: #EAF3DE;
            color: #3B6D11;
        }

        .status-current {
            background: #FAEEDA;
            color: #854F0B;
        }

        .status-locked {
            background: var(--bg);
            color: var(--text-light);
        }

        .lesson-time {
            font-size: 11px;
            color: var(--text-light);
            flex-shrink: 0;
            width: 40px;
            text-align: right;
        }

        /* ?Җ?Җ?Җ LESSON VIEW ?Җ?Җ?Җ */
        .lesson-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
            align-items: start;
        }

        .lesson-content {
            min-width: 0;
        }

        .lesson-sidebar-panel {
            position: sticky;
            top: 76px;
        }

        /* Section Cards */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 14px;
            overflow: hidden;
        }

        .section-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .section-card-header:hover {
            background: var(--bg);
        }

        .section-num-badge {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .section-card-header h4 {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .section-card-header .time-tag {
            font-size: 11px;
            color: var(--text-light);
            background: var(--bg);
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .section-card-body {
            padding: 20px;
        }

        .section-card.collapsed .section-card-body {
            display: none;
        }

        /* Achievement standard */
        .achievement-box {
            background: var(--unit-1-light);
            border: 1px solid rgba(123, 116, 217, .2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 14px;
        }

        .achievement-code {
            font-size: 11px;
            font-weight: 700;
            color: var(--unit-1);
            margin-bottom: 4px;
            font-family: monospace;
        }

        .achievement-text {
            font-size: 13px;
            color: var(--text);
        }

        .goal-list {
            list-style: none;
        }

        .goal-list li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }

        .goal-list li:last-child {
            border-bottom: none;
        }

        .goal-list li::before {
            content: '??;
            font-size: 11px;
            color: var(--unit-5);
            background: var(--unit-5-light);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .concept-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .concept-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all .15s;
            color: var(--text-muted);
        }

        .concept-tag:hover {
            border-color: var(--unit-1);
            color: var(--unit-1);
        }

        /* Concept explanation */
        .concept-block {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .concept-text h5 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .concept-text p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .concept-visual {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            font-size: 12px;
            color: var(--text-light);
            flex-direction: column;
            gap: 8px;
            padding: 16px;
        }

        .concept-visual svg {
            opacity: .4;
        }

        .caution-box {
            background: #FFFBF0;
            border: 1px solid #F0D080;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 12px;
            color: #7A5A00;
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-top: 12px;
        }

        /* Interaction */
        .interaction-type-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .type-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .type-badge.selected {
            border-color: currentColor;
        }

        .quiz-container {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 18px;
        }

        .quiz-q {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            transition: all .15s;
        }

        .quiz-option:hover {
            border-color: var(--unit-1);
            background: var(--unit-1-light);
        }

        .quiz-option.correct {
            border-color: var(--unit-5);
            background: var(--unit-5-light);
            color: #2A5A08;
        }

        .quiz-option.wrong {
            border-color: var(--unit-3);
            background: var(--unit-3-light);
            color: #7A2A0A;
        }

        .quiz-option .opt-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--border);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .quiz-feedback {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            display: none;
        }

        .quiz-feedback.show {
            display: block;
        }

        .quiz-feedback.correct {
            background: var(--unit-5-light);
            color: #2A5A08;
            border: 1px solid rgba(90, 150, 34, .2);
        }

        .quiz-feedback.wrong {
            background: var(--unit-3-light);
            color: #7A2A0A;
            border: 1px solid rgba(216, 90, 48, .2);
        }

        /* Code block */
        .code-container {
            background: #1E1E2E;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .code-toolbar {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            background: #2A2A3E;
            gap: 8px;
        }

        .code-lang {
            font-size: 11px;
            color: #888;
            flex: 1;
            font-family: monospace;
        }

        .code-btn {
            font-size: 11px;
            padding: 3px 10px;
            background: rgba(255, 255, 255, .1);
            color: #ccc;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s;
        }

        .code-btn:hover {
            background: rgba(255, 255, 255, .2);
        }

        .code-btn.run-btn {
            background: rgba(29, 158, 114, .3);
            color: #7ED9B8;
        }

        .code-btn.run-btn:hover {
            background: rgba(29, 158, 114, .5);
        }

        pre {
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.8;
            color: #CDD6F4;
            overflow-x: auto;
            margin: 0;
        }

        .kw {
            color: #CBA6F7;
        }

        .fn {
            color: #89B4FA;
        }

        .str {
            color: #A6E3A1;
        }

        .cm {
            color: #6C7086;
            font-style: italic;
        }

        .num {
            color: #FAB387;
        }

        .code-output {
            padding: 10px 14px;
            background: #181825;
            font-family: monospace;
            font-size: 12px;
            color: #A6E3A1;
            border-top: 1px solid #333;
            display: none;
        }

        .code-output.show {
            display: block;
        }

        /* Performance section */
        .task-spec {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 14px;
        }

        .task-spec h5 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--unit-4);
        }

        .task-spec p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .rubric-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 14px;
        }

        .rubric-table th {
            background: var(--bg);
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1.5px solid var(--border);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .rubric-table td {
            padding: 9px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .rubric-table tr:last-child td {
            border-bottom: none;
        }

        .level-4 {
            color: #2A5A08;
            font-weight: 600;
        }

        .level-3 {
            color: #4A6A28;
        }

        .level-2 {
            color: #854F0B;
        }

        .level-1 {
            color: #993C1D;
        }

        .self-check {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .check-row {
            display: flex;
            align-items: center;
