<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 교과 웹 학습 플랫폼</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg-dark: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
        }
        body { font-family: 'Inter', 'Outfit', sans-serif; background-color: var(--bg-dark); color: #f9fafb; overflow-x: hidden; }
        .glass { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%); }
    </style>
</head>
<body>
    <div class="fixed inset-0 hero-gradient pointer-events-none"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="ph-bold ph-terminal-window text-white text-xl"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight text-white">정보<span class="text-indigo-400">학습플랫폼</span></span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a href="#features" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">주요 기능</a>
                <a href="#curriculum" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">커리큘럼</a>
                <a href="admin.html" class="px-5 py-2.5 bg-white text-slate-900 rounded-full text-sm font-bold hover:bg-slate-100 transition-all shadow-xl shadow-white/5">학습 시작하기</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="h-[80vh] flex flex-col items-center justify-center relative px-6 text-center">
        <div class="mb-6 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-bold uppercase tracking-wider">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
            </span>
            2022 개정 교육과정 반영
        </div>
        <h1 class="text-5xl md:text-7xl lg:text-8xl font-black text-white mb-8 tracking-tighter leading-none">
            미래를 여는 <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">디지털 리터러시</span>
        </h1>
        <p class="max-w-2xl text-lg text-slate-400 mb-12 font-medium">컴퓨팅 사고력과 인공지능 활용 능력을 키우는 최고의 정보 교과 학습 경험을 시작해 보세요.</p>
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="admin.html" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl text-lg font-bold hover:bg-indigo-500 transition-all shadow-2xl shadow-indigo-500/30">플랫폼 입장하기</a>
            <a href="#curriculum" class="px-8 py-4 glass text-white rounded-2xl text-lg font-bold hover:bg-white/10 transition-all">둘러보기</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-12 relative z-10 bg-black/20">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <i class="ph-fill ph-terminal-window text-indigo-500 text-2xl"></i>
                <span class="font-bold text-white tracking-tight">정보학습플랫폼</span>
            </div>
            <p class="text-slate-500 text-sm font-medium hover:text-slate-300 transition-colors cursor-default">© 2026 Middle School Informatics. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
