<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IV. 인공지능</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css">
    <style>body { font-family: 'Pretendard', sans-serif; background-color: transparent; }</style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto bg-white p-10 rounded-3xl shadow-sm border border-orange-100">
        <div class="mb-10 pb-6 border-b border-gray-100">
            <div class="inline-block bg-orange-50 text-orange-600 text-xs font-black tracking-widest px-3 py-1 rounded-full mb-3 uppercase">
                대단원 개요
            </div>
            <h1 class="text-4xl font-extrabold text-gray-900 flex items-center gap-3">
                <i class="ph-fill ph-brain text-orange-500"></i> IV. 인공지능
            </h1>
        </div>
        <div class="mb-10 text-gray-600 text-lg leading-relaxed bg-gray-50 border border-gray-100 p-6 rounded-2xl">
            기계학습 모델을 직접 학습시켜보며 인공지능의 원리와 데이터의 중요성을 발견합니다. 이미지 분류, 소리, 텍스트 데이터 분석을 통해 생활 주변의 문제들을 윤리적이고 창의적으로 해결합니다.
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
            <i class="ph-fill ph-list-numbers text-gray-400"></i> 단원 구성
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="border border-gray-200 rounded-xl p-5 hover:border-orange-300 hover:bg-orange-50/30 transition-colors">
                <h3 class="font-bold text-gray-900 mb-2">1. 인공지능과 학습</h3>
                <p class="text-sm text-gray-500">총 2차시 구성</p>
            </div>
            <div class="border border-gray-200 rounded-xl p-5 hover:border-orange-300 hover:bg-orange-50/30 transition-colors">
                <h3 class="font-bold text-gray-900 mb-2">2. 인공지능과 문제 해결</h3>
                <p class="text-sm text-gray-500">총 4차시 구성</p>
            </div>
            <div class="col-span-1 md:col-span-2 bg-gradient-to-r from-orange-400 to-amber-500 rounded-xl p-5 text-white flex justify-between items-center mt-2 shadow-md">
                <div>
                    <h3 class="font-bold mb-1">과정 중심의 수행활동</h3>
                    <p class="text-xs text-orange-100">단원 마무리 및 지식 점검</p>
                </div>
                <i class="ph-fill ph-medal text-3xl text-yellow-300"></i>
            </div>
        </div>
    </div>
</body>
</html>
