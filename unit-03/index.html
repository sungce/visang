<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>III. 알고리즘과 프로그래밍</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css">
    <style>body { font-family: 'Pretendard', sans-serif; background-color: transparent; }</style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto bg-white p-10 rounded-3xl shadow-sm border border-pink-100">
        <div class="mb-10 pb-6 border-b border-gray-100">
            <div class="inline-block bg-pink-50 text-pink-600 text-xs font-black tracking-widest px-3 py-1 rounded-full mb-3 uppercase">
                대단원 개요
            </div>
            <h1 class="text-4xl font-extrabold text-gray-900 flex items-center gap-3">
                <i class="ph-fill ph-code-block text-pink-500"></i> III. 알고리즘과 프로그래밍
            </h1>
        </div>
        <div class="mb-10 text-gray-600 text-lg leading-relaxed bg-gray-50 border border-gray-100 p-6 rounded-2xl">
            컴퓨팅 사고력을 발휘해 문제를 추상화하고, 논리적인 알고리즘을 설계합니다. 파이썬을 이용해 제어 구조, 자료구조(리스트), 함수 등을 배우고 직접 프로그램을 작성해 창의적으로 문제를 해결합니다.
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
            <i class="ph-fill ph-list-numbers text-gray-400"></i> 단원 구성
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="border border-gray-200 rounded-xl p-5 hover:border-pink-300 hover:bg-pink-50/30 transition-colors">
                <h3 class="font-bold text-gray-900 mb-2">1. 추상화와 알고리즘</h3>
                <p class="text-sm text-gray-500">총 4차시 구성</p>
            </div>
            <div class="border border-gray-200 rounded-xl p-5 hover:border-pink-300 hover:bg-pink-50/30 transition-colors">
                <h3 class="font-bold text-gray-900 mb-2">2. 프로그래밍</h3>
                <p class="text-sm text-gray-500">총 6차시 구성</p>
            </div>
            <div class="col-span-1 md:col-span-2 bg-gradient-to-r from-pink-500 to-rose-500 rounded-xl p-5 text-white flex justify-between items-center mt-2 shadow-md">
                <div>
                    <h3 class="font-bold mb-1">과정 중심의 수행활동</h3>
                    <p class="text-xs text-pink-100">단원 마무리 및 지식 점검</p>
                </div>
                <i class="ph-fill ph-medal text-3xl text-yellow-300"></i>
            </div>
        </div>
    </div>
</body>
</html>
